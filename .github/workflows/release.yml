name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Rust crates.io ──
  publish-rust:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p pyrosql-protocol --token ${{ secrets.CRATES_IO_TOKEN }}
      - run: sleep 30
      - run: cargo publish -p pyrosql --token ${{ secrets.CRATES_IO_TOKEN }}
    continue-on-error: true

  # ── FFI shared libraries ──
  build-ffi:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libpyrosql_ffi_pwire.so
            label: linux-x86_64
            ext: .so
          - os: macos-14
            target: aarch64-apple-darwin
            lib: libpyrosql_ffi_pwire.dylib
            label: macos-arm64
            ext: .dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: pyrosql_ffi_pwire.dll
            label: windows-x86_64
            ext: .dll
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-${{ matrix.target }}
      - run: cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp ffi-pwire/target/${{ matrix.target }}/release/${{ matrix.lib }} \
             dist/pyrosql-driver-${{ github.ref_name }}-${{ matrix.label }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  # ── Python wheel ──
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: cd python && python -m build --wheel --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: python
          path: python/dist/*.whl

  # ── Publish Python to PyPI ──
  publish-python:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
    continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # .deb for Debian / Ubuntu — amd64 + arm64. Payload = libpyrosql_ffi_pwire.so
  # from the ffi-pwire crate. Package name = `pyrosql-driver`.
  # ─────────────────────────────────────────────────────────────────────────
  # .deb for Debian / Ubuntu — DUAL TRACK:
  #   stable         : built in manylinux_2_28 (glibc 2.28, Linux 2018+).
  #                    Default. Modern kernels + glibc, best perf on
  #                    current systems.
  #   stable-legacy  : built in manylinux2014 (glibc 2.17, Linux 2012+).
  #                    Covers RHEL/CentOS 7, Ubuntu 14.04+, any 10-year-old
  #                    box. Same code, same perf — different linking floor.
  build-deb:
    name: Build .deb (${{ matrix.track }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: amd64, target: x86_64-unknown-linux-gnu,  container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: arm64, target: aarch64-unknown-linux-gnu, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: amd64, target: x86_64-unknown-linux-gnu,  container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: arm64, target: aarch64-unknown-linux-gnu, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      - uses: actions/checkout@v4

      # manylinux images are CentOS-based → yum/dnf, not apt. They also
      # lack Rust + cargo-deb out of the box; install both inside.
      - name: Install Rust toolchain in container
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dpkg-dev + cargo-deb
        shell: bash
        run: |
          # cargo-deb is a Rust binary; install via cargo. dpkg-dev is
          # needed by cargo-deb internally for Packages index diffs, etc.
          yum install -y dpkg dpkg-dev 2>/dev/null || true
          $HOME/.cargo/bin/cargo install cargo-deb --locked

      - name: Build cdylib
        shell: bash
        run: cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package .deb (retag with track suffix)
        shell: bash
        run: |
          cargo deb --manifest-path ffi-pwire/Cargo.toml --target ${{ matrix.target }} --no-build
          # cargo-deb names the file pyrosql-driver_<ver>_<arch>.deb — rename to
          # include the track so the publish job routes it correctly.
          cd ffi-pwire/target/${{ matrix.target }}/debian
          for f in *.deb; do
            mv "$f" "${f%.deb}_${{ matrix.track }}.deb"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.track }}-${{ matrix.arch }}
          path: ffi-pwire/target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # .rpm for Fedora / RHEL / Rocky / Alma — same dual-track strategy.
  build-rpm:
    name: Build .rpm (${{ matrix.track }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: x86_64,  target: x86_64-unknown-linux-gnu,  container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: aarch64, target: aarch64-unknown-linux-gnu, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: x86_64,  target: x86_64-unknown-linux-gnu,  container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: aarch64, target: aarch64-unknown-linux-gnu, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain in container
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-generate-rpm
        shell: bash
        run: $HOME/.cargo/bin/cargo install cargo-generate-rpm --locked

      - name: Build cdylib
        shell: bash
        run: cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package .rpm (retag with track suffix)
        shell: bash
        run: |
          cargo generate-rpm -p ffi-pwire --target ${{ matrix.target }} --payload-compress zstd
          cd ffi-pwire/target/${{ matrix.target }}/generate-rpm
          for f in *.rpm; do
            mv "$f" "${f%.rpm}.${{ matrix.track }}.rpm"
          done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.arch }}
          path: ffi-pwire/target/${{ matrix.target }}/generate-rpm/*.rpm
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release — bundles tarballs, Python wheel, .deb, .rpm as assets
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: GitHub Release
    needs: [build-ffi, build-python, build-deb, build-rpm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          name: python
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - run: ls -la assets/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/*

  # ─────────────────────────────────────────────────────────────────────────
  # Publish apt + yum repos to GitHub Pages — Tier 2 vendor-hosted repo
  # without leaving GitHub. After this job, users install with:
  #
  #   curl -fsSL https://pyrosql.github.io/pyrosql-driver/gpg.key \
  #       | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
  #   echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://pyrosql.github.io/pyrosql-driver/apt stable main" \
  #       | sudo tee /etc/apt/sources.list.d/pyrosql.list
  #   sudo apt update && sudo apt install pyrosql-driver
  #
  # One-time admin setup (see docs/packaging-tier2-setup.md):
  #   - Secrets: GPG_PRIVATE_KEY, GPG_PASSPHRASE, GPG_KEY_ID.
  #   - Settings → Pages → Source = Deploy from branch `gh-pages`.
  # ─────────────────────────────────────────────────────────────────────────
  publish-apt-yum:
    name: Publish apt + yum repo
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    if: "!contains(github.ref, '-rc')"
    steps:
      - name: Checkout gh-pages (or create fresh)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Ensure gh-pages tree exists
        run: |
          # Dual-track: `stable` (glibc 2.28) and `stable-legacy` (glibc 2.17).
          for track in stable stable-legacy; do
            mkdir -p site/apt/$track/pool/main
            mkdir -p site/apt/$track/dists/stable/main/binary-amd64
            mkdir -p site/apt/$track/dists/stable/main/binary-arm64
            mkdir -p site/yum/$track/x86_64
            mkdir -p site/yum/$track/aarch64
          done
          [ -d site/.git ] || git -C site init -q --initial-branch=gh-pages

      - name: Install apt + yum tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c gpg

      - name: Import release GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret missing — see docs/packaging-tier2-setup.md"
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          path: rpms
          merge-multiple: true

      - name: Route .deb into per-track pool
        run: |
          # Files are named *_stable.deb or *_stable-legacy.deb (from the
          # rename step in build-deb). Route by suffix before the .deb.
          for f in debs/*.deb; do
            case "$f" in
              *_stable-legacy.deb) cp "$f" site/apt/stable-legacy/pool/main/ ;;
              *_stable.deb)        cp "$f" site/apt/stable/pool/main/ ;;
              *) echo "::warning::unknown track suffix for $f" ;;
            esac
          done

      - name: Route .rpm into per-track/per-arch pool
        run: |
          # Files end .stable.rpm or .stable-legacy.rpm (rename in build-rpm).
          for f in rpms/*.rpm; do
            arch=x86_64
            case "$f" in
              *aarch64*) arch=aarch64 ;;
            esac
            case "$f" in
              *.stable-legacy.rpm) cp "$f" site/yum/stable-legacy/$arch/ ;;
              *.stable.rpm)        cp "$f" site/yum/stable/$arch/ ;;
              *) echo "::warning::unknown track suffix for $f" ;;
            esac
          done

      - name: Regenerate apt metadata (per track)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for track in stable stable-legacy; do
            cd site/apt/$track
            for arch in amd64 arm64; do
              dpkg-scanpackages --arch $arch pool/ > dists/stable/main/binary-$arch/Packages
              gzip -kf dists/stable/main/binary-$arch/Packages
            done
            cat > apt-release.conf <<EOF
            APT::FTPArchive::Release::Origin "PyroSQL";
            APT::FTPArchive::Release::Label "PyroSQL-${track}";
            APT::FTPArchive::Release::Suite "stable";
            APT::FTPArchive::Release::Codename "stable";
            APT::FTPArchive::Release::Architectures "amd64 arm64";
            APT::FTPArchive::Release::Components "main";
            APT::FTPArchive::Release::Description "PyroSQL apt repository (${track})";
            EOF
            apt-ftparchive -c apt-release.conf release dists/stable > dists/stable/Release
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --default-key "$GPG_KEY_ID" -abs -o dists/stable/Release.gpg dists/stable/Release
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --default-key "$GPG_KEY_ID" --clearsign -o dists/stable/InRelease dists/stable/Release
            cd -
          done

      - name: Regenerate yum repodata (per track)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for track in stable stable-legacy; do
            for arch in x86_64 aarch64; do
              dir=site/yum/$track/$arch
              createrepo_c $dir
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                --default-key "$GPG_KEY_ID" --detach-sign --armor \
                --output $dir/repodata/repomd.xml.asc $dir/repodata/repomd.xml
            done
          done

      - name: Export public key
        run: gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > site/gpg.key

      - name: Write index.html with install snippets
        run: |
          PAGES_URL="${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          cat > site/index.html <<HTML
          <!doctype html>
          <title>PyroSQL driver package repository</title>
          <h1>PyroSQL driver — Linux package repository</h1>
          <p>Client-side driver only. For the server binary see the
             <code>pyrosql-server</code> package distributed separately.</p>
          <h2>Pick a track</h2>
          <p><strong>stable</strong> — built on glibc 2.28 (CentOS 8 / Ubuntu 20.04 / Debian 11+). Use this unless you know you need legacy.<br>
          <strong>stable-legacy</strong> — built on glibc 2.17 (CentOS 7 / Ubuntu 14.04+). Use this on &gt;5-year-old systems (RHEL 7, CentOS 7, old Ubuntu). Identical code, different glibc floor.</p>
          <h2>Debian / Ubuntu — modern (stable)</h2>
          <pre>curl -fsSL https://${PAGES_URL}/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
          echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://${PAGES_URL}/apt/stable stable main" | sudo tee /etc/apt/sources.list.d/pyrosql.list
          sudo apt update
          sudo apt install pyrosql-driver</pre>
          <h2>Debian / Ubuntu — legacy (stable-legacy)</h2>
          <pre>curl -fsSL https://${PAGES_URL}/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
          echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://${PAGES_URL}/apt/stable-legacy stable main" | sudo tee /etc/apt/sources.list.d/pyrosql.list
          sudo apt update
          sudo apt install pyrosql-driver</pre>
          <h2>Fedora / RHEL / Rocky / Alma — modern (stable)</h2>
          <pre>sudo tee /etc/yum.repos.d/pyrosql.repo <<EOF
          [pyrosql]
          name=PyroSQL
          baseurl=https://${PAGES_URL}/yum/stable/\\\$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=https://${PAGES_URL}/gpg.key
          EOF
          sudo dnf install pyrosql-driver</pre>
          <h2>Fedora / RHEL / Rocky / Alma — legacy (stable-legacy)</h2>
          <pre>sudo tee /etc/yum.repos.d/pyrosql.repo <<EOF
          [pyrosql]
          name=PyroSQL
          baseurl=https://${PAGES_URL}/yum/stable-legacy/\\\$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=https://${PAGES_URL}/gpg.key
          EOF
          sudo dnf install pyrosql-driver</pre>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: false
          commit_message: "repo: publish ${{ github.ref_name }} packages"

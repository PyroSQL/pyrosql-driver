name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # NOTE: `publish-rust` (crates.io) is disabled.  It can only work after
  # `pyro-runtime` itself is published to crates.io, which in turn requires
  # `PyroSQL/pyrosql` to be public.  Re-enable this job once both are true
  # — until then cargo publish rejects the git dependency.

  # ── FFI shared libraries ──
  build-ffi:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libpyrosql_ffi_pwire.so
            label: linux-x86_64
            ext: .so
          - os: macos-14
            target: aarch64-apple-darwin
            lib: libpyrosql_ffi_pwire.dylib
            label: macos-arm64
            ext: .dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: pyrosql_ffi_pwire.dll
            label: windows-x86_64
            ext: .dll
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-${{ matrix.target }}
      - run: cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp ffi-pwire/target/${{ matrix.target }}/release/${{ matrix.lib }} \
             dist/pyrosql-driver-${{ github.ref_name }}-${{ matrix.label }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  # ── Python wheel ──
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: cd python && python -m build --wheel --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: python
          path: python/dist/*.whl

  # ── Publish Python to PyPI ──
  publish-python:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
    continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # .deb for Debian / Ubuntu — amd64 + arm64. Payload = libpyrosql_ffi_pwire.so
  # from the ffi-pwire crate. Package name = `pyrosql-driver`.
  # ─────────────────────────────────────────────────────────────────────────
  # .deb for Debian / Ubuntu — DUAL TRACK:
  #   stable         : built in manylinux_2_28 (glibc 2.28, Linux 2018+).
  #                    Default. Modern kernels + glibc, best perf on
  #                    current systems.
  #   stable-legacy  : built in manylinux2014 (glibc 2.17, Linux 2012+).
  #                    Covers RHEL/CentOS 7, Ubuntu 14.04+, any 10-year-old
  #                    box. Same code, same perf — different linking floor.
  build-deb:
    name: Build .deb (${{ matrix.track }}/${{ matrix.arch }})
    # Native runners per arch — no QEMU, no cross-compile.
    # `ubuntu-24.04-arm` is GitHub's free-tier ARM runner (GA 2025-01).
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: amd64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: arm64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: amd64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: arm64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      # Checkout happens on the HOST (modern glibc on the Ubuntu runner),
      # not inside the container — manylinux2014's glibc 2.17 is too old
      # for Node 20 (which actions/checkout@v4 needs).
      - uses: actions/checkout@v4

      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      # Build the .deb inside the manylinux container via explicit `docker run`.
      # Mounting the checked-out tree + the host's git credentials lets us
      # reuse the host-side checkout, so we never invoke `actions/checkout`
      # inside the ancient-glibc environment.
      - name: Build inside manylinux container
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e CARGO_TERM_COLOR=always \
            ${{ matrix.container }} \
            bash -euxc '
              # Install Rust (matches workspace toolchain).
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
              export PATH="$HOME/.cargo/bin:$PATH"

              # Inside-container git token for the private pyro-runtime dep.
              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              # dpkg + dpkg-dev — manylinux is CentOS-based and has no apt,
              # so we install dpkg from EPEL (stable) or rpm fallback.
              yum install -y dpkg dpkg-dev 2>/dev/null || \
                dnf install -y dpkg dpkg-dev 2>/dev/null || \
                true

              # cargo-deb provides the packaging pipeline; installing
              # --locked pins to the Cargo.lock from the tool itself.
              cargo install cargo-deb --locked

              # Actual build + packaging.
              cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
              cargo deb --manifest-path ffi-pwire/Cargo.toml --target ${{ matrix.target }} --no-build

              # Leave the filename in standard Debian format
              # (pyrosql-driver_<ver>_<arch>.deb). The track is already
              # encoded in the upload-artifact name (debs-<track>-<arch>)
              # and the publish job routes artifacts into per-track pools
              # based on that — no need to mangle the filename, which
              # breaks `dpkg-scanpackages` arch parsing.
              ls -la ffi-pwire/target/${{ matrix.target }}/debian/
            '

      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.track }}-${{ matrix.arch }}
          path: ffi-pwire/target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # .rpm for Fedora / RHEL / Rocky / Alma — same dual-track strategy.
  build-rpm:
    name: Build .rpm (${{ matrix.track }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: x86_64,  target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: aarch64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: x86_64,  target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: aarch64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build inside manylinux container
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e CARGO_TERM_COLOR=always \
            ${{ matrix.container }} \
            bash -euxc '
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
              export PATH="$HOME/.cargo/bin:$PATH"

              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              cargo install cargo-generate-rpm --locked

              cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
              cargo generate-rpm -p ffi-pwire --target ${{ matrix.target }} --payload-compress zstd

              # Same reasoning as .deb — keep the standard
              # <name>-<ver>.<arch>.rpm filename so createrepo_c parses
              # the arch correctly. Track is routed via artifact name.
              ls -la target/${{ matrix.target }}/generate-rpm/
            '

      - uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.track }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/generate-rpm/*.rpm
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # .apk for Alpine Linux — SINGLE TRACK. Alpine uses musl libc (not glibc)
  # so the .deb/.rpm dual-track strategy doesn't apply here: we build one
  # `x86_64-unknown-linux-musl` (+ aarch64 equivalent) artifact on a
  # mid-range Alpine (3.19 / musl 1.2.4) and call it a day. If legacy
  # Alpine 3.13 ever matters we can add a second track later.
  #
  # Signing uses Alpine's own scheme (RSA key + abuild-sign) — completely
  # separate from the GPG key used for apt/yum. The public key is checked
  # into .github/alpine-signing/ (visible to everyone, that's fine —
  # pubkey only). The private key is the `ALPINE_SIGNING_PRIVATE_KEY`
  # secret; if it's missing we emit a ::warning:: + skip the apk build,
  # mirroring the soft-failure behaviour the publish job expects for
  # optional artefacts.
  # ─────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build .apk (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  target: x86_64-unknown-linux-musl,  runner: ubuntu-latest    }
          - { arch: aarch64, target: aarch64-unknown-linux-musl, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Check for Alpine signing key secret
        id: check_key
        env:
          ALPINE_SIGNING_PRIVATE_KEY: ${{ secrets.ALPINE_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$ALPINE_SIGNING_PRIVATE_KEY" ]; then
            echo "::warning::ALPINE_SIGNING_PRIVATE_KEY secret missing — skipping .apk build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git to fetch pyro-runtime via token
        if: steps.check_key.outputs.skip != 'true'
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Extract workspace version
        if: steps.check_key.outputs.skip != 'true'
        id: ver
        run: |
          # Match the top-level workspace.package.version = "x.y.z" line
          # (NOT a nested dep). The Cargo.toml here puts it right under
          # [workspace.package] so a simple grep is enough.
          v=$(grep -E '^\s*version\s*=' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "pkgver=$v" >> "$GITHUB_OUTPUT"
          echo "Detected workspace version: $v"

      - name: Build .apk inside alpine:3.19
        if: steps.check_key.outputs.skip != 'true'
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
          ALPINE_SIGNING_PRIVATE_KEY: ${{ secrets.ALPINE_SIGNING_PRIVATE_KEY }}
          PKGVER: ${{ steps.ver.outputs.pkgver }}
          RUST_TARGET: ${{ matrix.target }}
          APK_ARCH: ${{ matrix.arch }}
        run: |
          # Stage the privkey on the host so we can mount it read-only
          # into the container. Passing it via -e would leak into `ps`.
          mkdir -p /tmp/alpine-keys
          printf '%s' "$ALPINE_SIGNING_PRIVATE_KEY" > /tmp/alpine-keys/info-pyrosql-com.rsa
          chmod 600 /tmp/alpine-keys/info-pyrosql-com.rsa
          # Copy the in-repo pubkey alongside — abuild needs BOTH (the
          # privkey signs, the pubkey goes into /etc/apk/keys of the
          # build sandbox so the signed index round-trip verifies).
          cp .github/alpine-signing/info-pyrosql-com.rsa.pub /tmp/alpine-keys/

          mkdir -p /tmp/apk-out

          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v /tmp/alpine-keys:/keys:ro \
            -v /tmp/apk-out:/out \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e PKGVER="$PKGVER" \
            -e RUST_TARGET="$RUST_TARGET" \
            -e APK_ARCH="$APK_ARCH" \
            -e CARGO_TERM_COLOR=always \
            alpine:3.19 \
            sh -euxc '
              # alpine-sdk gives us abuild + abuild-sign + abuild-keygen
              # musl-dev / gcc are already in alpine-sdk.
              apk add --no-cache alpine-sdk sudo openssl curl git bash coreutils

              # rustup so we control the toolchain + can add the musl target.
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target "$RUST_TARGET"
              . "$HOME/.cargo/env"

              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              # Copy the source tree out of the read-only mount so cargo
              # can write into target/ without fighting RO permissions.
              cp -a /src /build
              cd /build

              # Build the cdylib against musl. Link openssl statically via
              # vendored feature? -- not needed: the ffi-pwire crate has
              # no openssl dep (see Cargo.toml).
              cargo build --manifest-path ffi-pwire/Cargo.toml --release --target "$RUST_TARGET"

              # Create a non-root user for abuild (abuild refuses to run
              # as root, which is a safety feature we respect).
              adduser -D -G abuild builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              # Give the builder its own APKBUILD dir. We materialise the
              # .in template with the workspace version substituted.
              mkdir -p /home/builder/pkg
              sed "s/@PKGVER@/${PKGVER}/g" alpine/APKBUILD.in > /home/builder/pkg/APKBUILD
              cp "ffi-pwire/target/${RUST_TARGET}/release/libpyrosql_ffi_pwire.so" /home/builder/pkg/
              cp LICENSE /home/builder/pkg/
              chown -R builder:abuild /home/builder

              # Install the signing keys where abuild looks for them:
              #   ~/.abuild/abuild.conf -> PACKAGER_PRIVKEY=/path/to/key
              #   /etc/apk/keys/<name>.rsa.pub -> used to verify signed indices
              su builder -c "mkdir -p /home/builder/.abuild"
              cp /keys/info-pyrosql-com.rsa  /home/builder/.abuild/info-pyrosql-com.rsa
              cp /keys/info-pyrosql-com.rsa.pub /home/builder/.abuild/info-pyrosql-com.rsa.pub
              chown builder:abuild /home/builder/.abuild/info-pyrosql-com.rsa*
              chmod 600 /home/builder/.abuild/info-pyrosql-com.rsa
              printf "PACKAGER_PRIVKEY=/home/builder/.abuild/info-pyrosql-com.rsa\n" \
                > /home/builder/.abuild/abuild.conf
              chown builder:abuild /home/builder/.abuild/abuild.conf

              # abuild wants the pubkey in /etc/apk/keys too, so the
              # final APKINDEX signature round-trips locally.
              cp /keys/info-pyrosql-com.rsa.pub /etc/apk/keys/

              # Generate checksums and build.
              cd /home/builder/pkg
              su builder -c "cd /home/builder/pkg && abuild checksum"
              # -r = install makedepends (there are none, but the flag
              # also triggers the full build+package pipeline).
              # -P = destination repo root (we do NOT use it; abuild
              # writes to ~/packages/<repo-name>/<arch>/ by default).
              su builder -c "cd /home/builder/pkg && abuild -r"

              # Collect the produced .apk. abuild puts it under
              #   ~/packages/<dirname-of-APKBUILD-parent>/<arch>/<name>-<ver>-r<rel>.apk
              # The parent dir of /home/builder/pkg is "builder", so:
              mkdir -p /out
              find /home/builder/packages -name "*.apk" -print -exec cp {} /out/ \;
              ls -la /out/
            '

          ls -la /tmp/apk-out/
          mkdir -p dist
          cp /tmp/apk-out/*.apk dist/

      - uses: actions/upload-artifact@v4
        if: steps.check_key.outputs.skip != 'true'
        with:
          name: apks-${{ matrix.arch }}
          path: dist/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # .deb / .rpm / .apk for the `pyrosql-cli` package (REPL binary). Same
  # matrix shape as the driver jobs so artefacts land next to each other
  # in the apt/yum/apk pools. The only thing that changes is the
  # manifest path (`cli/Cargo.toml`) and the binary that ends up in the
  # package (`target/<triple>/release/pyrosql`).
  # ─────────────────────────────────────────────────────────────────────────
  build-deb-cli:
    name: Build .deb cli (${{ matrix.track }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: amd64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: arm64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: amd64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: arm64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build cli .deb inside manylinux container
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e CARGO_TERM_COLOR=always \
            ${{ matrix.container }} \
            bash -euxc '
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
              export PATH="$HOME/.cargo/bin:$PATH"

              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              yum install -y dpkg dpkg-dev 2>/dev/null || \
                dnf install -y dpkg dpkg-dev 2>/dev/null || \
                true

              cargo install cargo-deb --locked

              # Build the binary from the workspace so the deb layout
              # (target/release/pyrosql) matches the `assets` entry.
              cargo build -p pyrosql-cli --release --target ${{ matrix.target }}
              cargo deb --manifest-path cli/Cargo.toml --target ${{ matrix.target }} --no-build

              ls -la target/${{ matrix.target }}/debian/
            '

      - uses: actions/upload-artifact@v4
        with:
          name: debs-cli-${{ matrix.track }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  build-rpm-cli:
    name: Build .rpm cli (${{ matrix.track }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: x86_64,  target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: aarch64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: x86_64,  target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: aarch64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build cli .rpm inside manylinux container
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e CARGO_TERM_COLOR=always \
            ${{ matrix.container }} \
            bash -euxc '
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
              export PATH="$HOME/.cargo/bin:$PATH"

              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              cargo install cargo-generate-rpm --locked

              cargo build -p pyrosql-cli --release --target ${{ matrix.target }}
              cargo generate-rpm -p cli --target ${{ matrix.target }} --payload-compress zstd

              # cargo-generate-rpm writes to <workspace>/target/<triple>/generate-rpm/
              ls -la target/${{ matrix.target }}/generate-rpm/
            '

      - uses: actions/upload-artifact@v4
        with:
          name: rpms-cli-${{ matrix.track }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/generate-rpm/*.rpm
          if-no-files-found: error

  build-apk-cli:
    name: Build .apk cli (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  target: x86_64-unknown-linux-musl,  runner: ubuntu-latest    }
          - { arch: aarch64, target: aarch64-unknown-linux-musl, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Check for Alpine signing key secret
        id: check_key
        env:
          ALPINE_SIGNING_PRIVATE_KEY: ${{ secrets.ALPINE_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$ALPINE_SIGNING_PRIVATE_KEY" ]; then
            echo "::warning::ALPINE_SIGNING_PRIVATE_KEY secret missing — skipping .apk cli build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git to fetch pyro-runtime via token
        if: steps.check_key.outputs.skip != 'true'
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Extract workspace version
        if: steps.check_key.outputs.skip != 'true'
        id: ver
        run: |
          v=$(grep -E '^\s*version\s*=' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "pkgver=$v" >> "$GITHUB_OUTPUT"
          echo "Detected workspace version: $v"

      - name: Build cli .apk inside alpine:3.19
        if: steps.check_key.outputs.skip != 'true'
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
          ALPINE_SIGNING_PRIVATE_KEY: ${{ secrets.ALPINE_SIGNING_PRIVATE_KEY }}
          PKGVER: ${{ steps.ver.outputs.pkgver }}
          RUST_TARGET: ${{ matrix.target }}
          APK_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p /tmp/alpine-keys-cli
          printf '%s' "$ALPINE_SIGNING_PRIVATE_KEY" > /tmp/alpine-keys-cli/info-pyrosql-com.rsa
          chmod 600 /tmp/alpine-keys-cli/info-pyrosql-com.rsa
          cp .github/alpine-signing/info-pyrosql-com.rsa.pub /tmp/alpine-keys-cli/

          mkdir -p /tmp/apk-cli-out

          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v /tmp/alpine-keys-cli:/keys:ro \
            -v /tmp/apk-cli-out:/out \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e PKGVER="$PKGVER" \
            -e RUST_TARGET="$RUST_TARGET" \
            -e APK_ARCH="$APK_ARCH" \
            -e CARGO_TERM_COLOR=always \
            alpine:3.19 \
            sh -euxc '
              apk add --no-cache alpine-sdk sudo openssl curl git bash coreutils

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target "$RUST_TARGET"
              . "$HOME/.cargo/env"

              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              cp -a /src /build
              cd /build

              cargo build -p pyrosql-cli --release --target "$RUST_TARGET"

              adduser -D -G abuild builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              mkdir -p /home/builder/pkg
              sed "s/@PKGVER@/${PKGVER}/g" alpine/APKBUILD-cli.in > /home/builder/pkg/APKBUILD
              cp "target/${RUST_TARGET}/release/pyrosql" /home/builder/pkg/pyrosql
              cp LICENSE /home/builder/pkg/
              chown -R builder:abuild /home/builder

              su builder -c "mkdir -p /home/builder/.abuild"
              cp /keys/info-pyrosql-com.rsa  /home/builder/.abuild/info-pyrosql-com.rsa
              cp /keys/info-pyrosql-com.rsa.pub /home/builder/.abuild/info-pyrosql-com.rsa.pub
              chown builder:abuild /home/builder/.abuild/info-pyrosql-com.rsa*
              chmod 600 /home/builder/.abuild/info-pyrosql-com.rsa
              printf "PACKAGER_PRIVKEY=/home/builder/.abuild/info-pyrosql-com.rsa\n" \
                > /home/builder/.abuild/abuild.conf
              chown builder:abuild /home/builder/.abuild/abuild.conf

              cp /keys/info-pyrosql-com.rsa.pub /etc/apk/keys/

              cd /home/builder/pkg
              su builder -c "cd /home/builder/pkg && abuild checksum"
              su builder -c "cd /home/builder/pkg && abuild -r"

              mkdir -p /out
              find /home/builder/packages -name "*.apk" -print -exec cp {} /out/ \;
              ls -la /out/
            '

          ls -la /tmp/apk-cli-out/
          mkdir -p dist
          cp /tmp/apk-cli-out/*.apk dist/

      - uses: actions/upload-artifact@v4
        if: steps.check_key.outputs.skip != 'true'
        with:
          name: apks-cli-${{ matrix.arch }}
          path: dist/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release — bundles tarballs, Python wheel, .deb, .rpm as assets
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: GitHub Release
    needs: [build-ffi, build-python, build-deb, build-rpm, build-apk, build-deb-cli, build-rpm-cli, build-apk-cli]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          name: python
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: apks-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - run: ls -la assets/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/*

  # ─────────────────────────────────────────────────────────────────────────
  # Publish apt + yum repos to GitHub Pages — Tier 2 vendor-hosted repo
  # without leaving GitHub. After this job, users install with:
  #
  #   curl -fsSL https://pyrosql.github.io/pyrosql-driver/gpg.key \
  #       | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
  #   echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://pyrosql.github.io/pyrosql-driver/apt stable main" \
  #       | sudo tee /etc/apt/sources.list.d/pyrosql.list
  #   sudo apt update && sudo apt install pyrosql-driver
  #
  # One-time admin setup (see docs/packaging-tier2-setup.md):
  #   - Secrets: GPG_PRIVATE_KEY, GPG_PASSPHRASE, GPG_KEY_ID.
  #   - Settings → Pages → Source = Deploy from branch `gh-pages`.
  # ─────────────────────────────────────────────────────────────────────────
  publish-apt-yum:
    name: Publish apt + yum + apk repo
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm, build-apk, build-deb-cli, build-rpm-cli, build-apk-cli]
    if: "!contains(github.ref, '-rc')"
    steps:
      # Check out `main` at the workflow root — gives us tools/gen_install_page.py
      # for the install page template.  Must run BEFORE the gh-pages checkout
      # so the default path (repo root) is main.
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages (or create fresh)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Ensure gh-pages tree exists
        run: |
          # Dual-track: `stable` (glibc 2.28) and `stable-legacy` (glibc 2.17).
          for track in stable stable-legacy; do
            mkdir -p site/apt/$track/pool/main
            mkdir -p site/apt/$track/dists/stable/main/binary-amd64
            mkdir -p site/apt/$track/dists/stable/main/binary-arm64
            mkdir -p site/yum/$track/x86_64
            mkdir -p site/yum/$track/aarch64
          done
          # Alpine .apk repo — SINGLE TRACK only (see build-apk comment).
          mkdir -p site/apk/stable/x86_64
          mkdir -p site/apk/stable/aarch64
          [ -d site/.git ] || git -C site init -q --initial-branch=gh-pages

      - name: Install apt + yum tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c gpg

      - name: Import release GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret missing — see docs/packaging-tier2-setup.md"
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      # Download each artifact into its own subdirectory so we can route
      # by the folder name (which encodes the track) rather than by the
      # filename (which we deliberately kept as plain
      # `pyrosql-driver_<v>_<arch>.deb` to not break dpkg-scanpackages).
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: false   # keeps per-artifact subfolders

      - uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          path: rpms
          merge-multiple: false

      # .apk artefacts are optional: if ALPINE_SIGNING_PRIVATE_KEY
      # wasn't set, the build-apk job emits a warning + skips, and no
      # `apks-*` artefacts exist. continue-on-error keeps the rest of
      # publish working (apt + yum remain fully functional alone).
      - uses: actions/download-artifact@v4
        with:
          pattern: apks-*
          path: apks
          merge-multiple: false
        continue-on-error: true

      - name: Route .deb into per-track pool
        run: |
          # Artifact folders look like:
          #   debs/debs-stable-amd64/*.deb                (driver, stable)
          #   debs/debs-stable-legacy-arm64/*.deb         (driver, legacy)
          #   debs/debs-cli-stable-amd64/*.deb            (cli, stable)
          #   debs/debs-cli-stable-legacy-arm64/*.deb     (cli, legacy)
          # Track = middle chunk between `debs-` (optional `cli-`) and the
          # trailing `-<arch>`.  Both packages land in the same pool so
          # `apt install pyrosql-driver pyrosql-cli` resolves from one repo.
          for d in debs/debs-*; do
            [ -d "$d" ] || continue
            base=$(basename "$d")            # e.g. debs-cli-stable-legacy-amd64
            # strip leading "debs-" and optional "cli-"
            track=${base#debs-}
            track=${track#cli-}
            track=${track%-amd64}
            track=${track%-arm64}
            case "$track" in
              stable|stable-legacy)
                cp "$d"/*.deb site/apt/$track/pool/main/
                ;;
              *) echo "::warning::unknown track ($track) in artifact $base" ;;
            esac
          done
          find site/apt -name '*.deb' -print

      - name: Route .rpm into per-track/per-arch pool
        run: |
          # Same pattern as .deb — driver and cli RPMs share the same
          # per-track/per-arch pool so `dnf install pyrosql-driver pyrosql-cli`
          # resolves from one repo.
          for d in rpms/rpms-*; do
            [ -d "$d" ] || continue
            base=$(basename "$d")            # e.g. rpms-cli-stable-legacy-aarch64
            case "$base" in
              *-aarch64) arch=aarch64 ;;
              *)         arch=x86_64  ;;
            esac
            track=${base#rpms-}
            track=${track#cli-}
            track=${track%-x86_64}
            track=${track%-aarch64}
            case "$track" in
              stable|stable-legacy)
                cp "$d"/*.rpm site/yum/$track/$arch/
                ;;
              *) echo "::warning::unknown track ($track) in artifact $base" ;;
            esac
          done
          find site/yum -name '*.rpm' -print

      - name: Route .apk into per-arch pool (single track)
        # Only runs if the build-apk job produced artefacts. If the
        # signing secret was missing, `apks/` is empty and this step
        # becomes a no-op.
        run: |
          if [ ! -d apks ] || [ -z "$(ls apks 2>/dev/null)" ]; then
            echo "::notice::no .apk artefacts present (signing key not configured); skipping apk routing."
            exit 0
          fi
          for d in apks/apks-*; do
            [ -d "$d" ] || continue
            base=$(basename "$d")            # apks-{,cli-}{x86_64,aarch64}
            arch=${base#apks-}
            arch=${arch#cli-}
            case "$arch" in
              x86_64|aarch64)
                cp "$d"/*.apk site/apk/stable/$arch/
                ;;
              *) echo "::warning::unknown arch ($arch) in artifact $base" ;;
            esac
          done
          find site/apk -name '*.apk' -print

      - name: Regenerate apt metadata (per track)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # NOTE: the `EOF` delimiter MUST start at column 0 (no leading
          # whitespace) for bash to recognise the heredoc terminator. The
          # YAML block-scalar indentation (10 spaces in this block) made
          # bash never find the delimiter → `unexpected end of file`.
          # Using `printf` instead sidesteps the indentation gotcha.
          for track in stable stable-legacy; do
            cd site/apt/$track
            for arch in amd64 arm64; do
              dpkg-scanpackages --arch $arch pool/ > dists/stable/main/binary-$arch/Packages
              gzip -kf dists/stable/main/binary-$arch/Packages
            done
            printf '%s\n' \
              'APT::FTPArchive::Release::Origin "PyroSQL";' \
              "APT::FTPArchive::Release::Label \"PyroSQL-${track}\";" \
              'APT::FTPArchive::Release::Suite "stable";' \
              'APT::FTPArchive::Release::Codename "stable";' \
              'APT::FTPArchive::Release::Architectures "amd64 arm64";' \
              'APT::FTPArchive::Release::Components "main";' \
              "APT::FTPArchive::Release::Description \"PyroSQL apt repository (${track})\";" \
              > apt-release.conf
            apt-ftparchive -c apt-release.conf release dists/stable > dists/stable/Release
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --default-key "$GPG_KEY_ID" -abs -o dists/stable/Release.gpg dists/stable/Release
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --default-key "$GPG_KEY_ID" --clearsign -o dists/stable/InRelease dists/stable/Release
            cd -
          done

      - name: Regenerate yum repodata (per track)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for track in stable stable-legacy; do
            for arch in x86_64 aarch64; do
              dir=site/yum/$track/$arch
              createrepo_c $dir
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                --default-key "$GPG_KEY_ID" --detach-sign --armor \
                --output $dir/repodata/repomd.xml.asc $dir/repodata/repomd.xml
            done
          done

      - name: Generate + sign APKINDEX (per-arch, single track)
        # Runs inside alpine:3.19 to get apk-tools + abuild-sign from
        # the distro where they're first-class. The privkey is mounted
        # read-only from /tmp/alpine-keys/ (written earlier if the
        # build-apk job ran — otherwise the step is a no-op).
        env:
          ALPINE_SIGNING_PRIVATE_KEY: ${{ secrets.ALPINE_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$ALPINE_SIGNING_PRIVATE_KEY" ]; then
            echo "::notice::ALPINE_SIGNING_PRIVATE_KEY missing — skipping apk index generation."
            exit 0
          fi
          # No apks routed → nothing to index.
          if [ -z "$(find site/apk -name '*.apk' -print -quit 2>/dev/null)" ]; then
            echo "::notice::no .apk files in site/apk — skipping index generation."
            exit 0
          fi

          mkdir -p /tmp/alpine-keys-publish
          printf '%s' "$ALPINE_SIGNING_PRIVATE_KEY" > /tmp/alpine-keys-publish/info-pyrosql-com.rsa
          chmod 600 /tmp/alpine-keys-publish/info-pyrosql-com.rsa
          cp .github/alpine-signing/info-pyrosql-com.rsa.pub /tmp/alpine-keys-publish/

          docker run --rm \
            -v "${{ github.workspace }}/site/apk:/apk" \
            -v /tmp/alpine-keys-publish:/keys:ro \
            alpine:3.19 \
            sh -euxc '
              apk add --no-cache alpine-sdk
              cp /keys/info-pyrosql-com.rsa.pub /etc/apk/keys/
              mkdir -p /root/.abuild
              cp /keys/info-pyrosql-com.rsa     /root/.abuild/info-pyrosql-com.rsa
              cp /keys/info-pyrosql-com.rsa.pub /root/.abuild/info-pyrosql-com.rsa.pub
              chmod 600 /root/.abuild/info-pyrosql-com.rsa
              printf "PACKAGER_PRIVKEY=/root/.abuild/info-pyrosql-com.rsa\n" \
                > /root/.abuild/abuild.conf

              for arch in x86_64 aarch64; do
                dir="/apk/stable/$arch"
                if [ ! -d "$dir" ] || [ -z "$(ls "$dir"/*.apk 2>/dev/null)" ]; then
                  echo "no apks in $dir — skipping"
                  continue
                fi
                cd "$dir"
                # `apk index` builds the APKINDEX.tar.gz describing every
                # .apk in the directory. -o = output path. --rewrite-arch
                # keeps the filename-derived arch in the index (matches
                # the per-dir layout we committed to).
                apk index -o APKINDEX.tar.gz --rewrite-arch "$arch" *.apk
                # abuild-sign appends the detached RSA signature inside
                # the tar itself (that is how Alpine expects it — not a
                # separate .sig file).
                abuild-sign -k /root/.abuild/info-pyrosql-com.rsa APKINDEX.tar.gz
                ls -la .
                cd -
              done
            '

      - name: Export Alpine public key
        run: |
          # User-visible pubkey fetched by `wget -O /etc/apk/keys/...`
          # from the install snippet. Always copied even when no apks
          # got built this run, so the URL stays stable across releases.
          cp .github/alpine-signing/info-pyrosql-com.rsa.pub site/apk/info-pyrosql-com.rsa.pub

      - name: Export public key
        run: gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > site/gpg.key

      - name: Write install page
        env:
          PAGES_URL: "${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        # Use `python3 -c` with a here-string (<<<) to sidestep the
        # heredoc-indentation landmine that bit `apt-release.conf`.
        run: python3 tools/gen_install_page.py > site/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: false
          commit_message: "repo: publish ${{ github.ref_name }} packages"

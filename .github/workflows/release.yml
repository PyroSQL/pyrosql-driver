name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Rust crates.io ──
  publish-rust:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::warning::PYROSQL_REPO_TOKEN secret is not set — cargo publish will fail to resolve pyro-runtime. Create a fine-grained PAT with read access to PyroSQL/pyrosql and save it as the repo secret PYROSQL_REPO_TOKEN."
          else
            git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - run: cargo publish -p pyrosql-protocol --token ${{ secrets.CRATES_IO_TOKEN }}
      - run: sleep 30
      - run: cargo publish -p pyrosql --token ${{ secrets.CRATES_IO_TOKEN }}
    continue-on-error: true

  # ── FFI shared libraries ──
  build-ffi:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libpyrosql_ffi_pwire.so
            label: linux-x86_64
            ext: .so
          - os: macos-14
            target: aarch64-apple-darwin
            lib: libpyrosql_ffi_pwire.dylib
            label: macos-arm64
            ext: .dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: pyrosql_ffi_pwire.dll
            label: windows-x86_64
            ext: .dll
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffi-${{ matrix.target }}
      - run: cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp ffi-pwire/target/${{ matrix.target }}/release/${{ matrix.lib }} \
             dist/pyrosql-driver-${{ github.ref_name }}-${{ matrix.label }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  # ── Python wheel ──
  build-python:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: cd python && python -m build --wheel --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: python
          path: python/dist/*.whl

  # ── Publish Python to PyPI ──
  publish-python:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
    continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # .deb for Debian / Ubuntu — amd64 + arm64. Payload = libpyrosql_ffi_pwire.so
  # from the ffi-pwire crate. Package name = `pyrosql-driver`.
  # ─────────────────────────────────────────────────────────────────────────
  # .deb for Debian / Ubuntu — DUAL TRACK:
  #   stable         : built in manylinux_2_28 (glibc 2.28, Linux 2018+).
  #                    Default. Modern kernels + glibc, best perf on
  #                    current systems.
  #   stable-legacy  : built in manylinux2014 (glibc 2.17, Linux 2012+).
  #                    Covers RHEL/CentOS 7, Ubuntu 14.04+, any 10-year-old
  #                    box. Same code, same perf — different linking floor.
  build-deb:
    name: Build .deb (${{ matrix.track }}/${{ matrix.arch }})
    # Native runners per arch — no QEMU, no cross-compile.
    # `ubuntu-24.04-arm` is GitHub's free-tier ARM runner (GA 2025-01).
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: amd64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: arm64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: amd64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: arm64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      # Checkout happens on the HOST (modern glibc on the Ubuntu runner),
      # not inside the container — manylinux2014's glibc 2.17 is too old
      # for Node 20 (which actions/checkout@v4 needs).
      - uses: actions/checkout@v4

      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      # Build the .deb inside the manylinux container via explicit `docker run`.
      # Mounting the checked-out tree + the host's git credentials lets us
      # reuse the host-side checkout, so we never invoke `actions/checkout`
      # inside the ancient-glibc environment.
      - name: Build inside manylinux container
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e CARGO_TERM_COLOR=always \
            ${{ matrix.container }} \
            bash -euxc '
              # Install Rust (matches workspace toolchain).
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
              export PATH="$HOME/.cargo/bin:$PATH"

              # Inside-container git token for the private pyro-runtime dep.
              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              # dpkg + dpkg-dev — manylinux is CentOS-based and has no apt,
              # so we install dpkg from EPEL (stable) or rpm fallback.
              yum install -y dpkg dpkg-dev 2>/dev/null || \
                dnf install -y dpkg dpkg-dev 2>/dev/null || \
                true

              # cargo-deb provides the packaging pipeline; installing
              # --locked pins to the Cargo.lock from the tool itself.
              cargo install cargo-deb --locked

              # Actual build + packaging.
              cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
              cargo deb --manifest-path ffi-pwire/Cargo.toml --target ${{ matrix.target }} --no-build

              # Tag the filename with the track (stable / stable-legacy) so
              # the publish job can route it into the right pool.
              cd ffi-pwire/target/${{ matrix.target }}/debian
              for f in *.deb; do
                mv "$f" "${f%.deb}_${{ matrix.track }}.deb"
              done
              ls -la
            '

      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.track }}-${{ matrix.arch }}
          path: ffi-pwire/target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # .rpm for Fedora / RHEL / Rocky / Alma — same dual-track strategy.
  build-rpm:
    name: Build .rpm (${{ matrix.track }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { track: stable,        arch: x86_64,  target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { track: stable,        arch: aarch64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_28_aarch64" }
          - { track: stable-legacy, arch: x86_64,  target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    container: "quay.io/pypa/manylinux2014_x86_64" }
          - { track: stable-legacy, arch: aarch64, target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux2014_aarch64" }
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::error::PYROSQL_REPO_TOKEN secret missing — cannot resolve private pyro-runtime dep."
            exit 1
          fi
          git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build inside manylinux container
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e PYROSQL_REPO_TOKEN="$PYROSQL_REPO_TOKEN" \
            -e CARGO_TERM_COLOR=always \
            ${{ matrix.container }} \
            bash -euxc '
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.94.1 --profile minimal --target ${{ matrix.target }}
              export PATH="$HOME/.cargo/bin:$PATH"

              git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

              cargo install cargo-generate-rpm --locked

              cargo build --manifest-path ffi-pwire/Cargo.toml --release --target ${{ matrix.target }}
              cargo generate-rpm -p ffi-pwire --target ${{ matrix.target }} --payload-compress zstd

              # Retag rpm with the track suffix before .rpm so the publish
              # job routes to the right pool (stable vs stable-legacy).
              cd target/${{ matrix.target }}/generate-rpm
              for f in *.rpm; do
                mv "$f" "${f%.rpm}.${{ matrix.track }}.rpm"
              done
              ls -la
            '

      - uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.track }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/generate-rpm/*.rpm
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release — bundles tarballs, Python wheel, .deb, .rpm as assets
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: GitHub Release
    needs: [build-ffi, build-python, build-deb, build-rpm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          merge-multiple: true
          path: assets/
      - uses: actions/download-artifact@v4
        with:
          name: python
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          merge-multiple: true
          path: assets/
        continue-on-error: true
      - run: ls -la assets/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/*

  # ─────────────────────────────────────────────────────────────────────────
  # Publish apt + yum repos to GitHub Pages — Tier 2 vendor-hosted repo
  # without leaving GitHub. After this job, users install with:
  #
  #   curl -fsSL https://pyrosql.github.io/pyrosql-driver/gpg.key \
  #       | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
  #   echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://pyrosql.github.io/pyrosql-driver/apt stable main" \
  #       | sudo tee /etc/apt/sources.list.d/pyrosql.list
  #   sudo apt update && sudo apt install pyrosql-driver
  #
  # One-time admin setup (see docs/packaging-tier2-setup.md):
  #   - Secrets: GPG_PRIVATE_KEY, GPG_PASSPHRASE, GPG_KEY_ID.
  #   - Settings → Pages → Source = Deploy from branch `gh-pages`.
  # ─────────────────────────────────────────────────────────────────────────
  publish-apt-yum:
    name: Publish apt + yum repo
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    if: "!contains(github.ref, '-rc')"
    steps:
      - name: Checkout gh-pages (or create fresh)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Ensure gh-pages tree exists
        run: |
          # Dual-track: `stable` (glibc 2.28) and `stable-legacy` (glibc 2.17).
          for track in stable stable-legacy; do
            mkdir -p site/apt/$track/pool/main
            mkdir -p site/apt/$track/dists/stable/main/binary-amd64
            mkdir -p site/apt/$track/dists/stable/main/binary-arm64
            mkdir -p site/yum/$track/x86_64
            mkdir -p site/yum/$track/aarch64
          done
          [ -d site/.git ] || git -C site init -q --initial-branch=gh-pages

      - name: Install apt + yum tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c gpg

      - name: Import release GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret missing — see docs/packaging-tier2-setup.md"
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: rpms-*
          path: rpms
          merge-multiple: true

      - name: Route .deb into per-track pool
        run: |
          # Files are named *_stable.deb or *_stable-legacy.deb (from the
          # rename step in build-deb). Route by suffix before the .deb.
          for f in debs/*.deb; do
            case "$f" in
              *_stable-legacy.deb) cp "$f" site/apt/stable-legacy/pool/main/ ;;
              *_stable.deb)        cp "$f" site/apt/stable/pool/main/ ;;
              *) echo "::warning::unknown track suffix for $f" ;;
            esac
          done

      - name: Route .rpm into per-track/per-arch pool
        run: |
          # Files end .stable.rpm or .stable-legacy.rpm (rename in build-rpm).
          for f in rpms/*.rpm; do
            arch=x86_64
            case "$f" in
              *aarch64*) arch=aarch64 ;;
            esac
            case "$f" in
              *.stable-legacy.rpm) cp "$f" site/yum/stable-legacy/$arch/ ;;
              *.stable.rpm)        cp "$f" site/yum/stable/$arch/ ;;
              *) echo "::warning::unknown track suffix for $f" ;;
            esac
          done

      - name: Regenerate apt metadata (per track)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for track in stable stable-legacy; do
            cd site/apt/$track
            for arch in amd64 arm64; do
              dpkg-scanpackages --arch $arch pool/ > dists/stable/main/binary-$arch/Packages
              gzip -kf dists/stable/main/binary-$arch/Packages
            done
            cat > apt-release.conf <<EOF
            APT::FTPArchive::Release::Origin "PyroSQL";
            APT::FTPArchive::Release::Label "PyroSQL-${track}";
            APT::FTPArchive::Release::Suite "stable";
            APT::FTPArchive::Release::Codename "stable";
            APT::FTPArchive::Release::Architectures "amd64 arm64";
            APT::FTPArchive::Release::Components "main";
            APT::FTPArchive::Release::Description "PyroSQL apt repository (${track})";
            EOF
            apt-ftparchive -c apt-release.conf release dists/stable > dists/stable/Release
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --default-key "$GPG_KEY_ID" -abs -o dists/stable/Release.gpg dists/stable/Release
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
              --default-key "$GPG_KEY_ID" --clearsign -o dists/stable/InRelease dists/stable/Release
            cd -
          done

      - name: Regenerate yum repodata (per track)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for track in stable stable-legacy; do
            for arch in x86_64 aarch64; do
              dir=site/yum/$track/$arch
              createrepo_c $dir
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                --default-key "$GPG_KEY_ID" --detach-sign --armor \
                --output $dir/repodata/repomd.xml.asc $dir/repodata/repomd.xml
            done
          done

      - name: Export public key
        run: gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > site/gpg.key

      - name: Write install page
        env:
          PAGES_URL: "${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: |
          python3 - <<'PY' > site/index.html
          import os
          url = os.environ['PAGES_URL']
          html = f"""<!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Install PyroSQL driver · apt / dnf / zypper</title>
          <style>
            :root {{ --fg:#1a1a1a; --muted:#6b6b6b; --bg:#fff; --accent:#ff5a1f; --code-bg:#f4f4f4; --border:#e5e5e5; }}
            * {{ box-sizing:border-box; }}
            body {{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; color:var(--fg); background:var(--bg); line-height:1.55; margin:0; padding:0 16px 80px; max-width:900px; margin-left:auto; margin-right:auto; }}
            header {{ padding:48px 0 32px; border-bottom:1px solid var(--border); margin-bottom:32px; }}
            h1 {{ font-size:2.2rem; margin:0 0 8px; letter-spacing:-0.02em; }}
            h1 span.orange {{ color:var(--accent); }}
            header p {{ color:var(--muted); margin:0; font-size:1.05rem; }}
            h2 {{ font-size:1.3rem; margin-top:48px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px; }}
            h3 {{ font-size:1.05rem; margin-top:28px; margin-bottom:8px; }}
            pre {{ background:var(--code-bg); border:1px solid var(--border); border-radius:6px; padding:14px 16px; overflow-x:auto; font-size:0.87rem; line-height:1.5; }}
            code {{ background:var(--code-bg); padding:1px 5px; border-radius:3px; font-size:0.9em; }}
            pre code {{ background:none; padding:0; }}
            .badge {{ display:inline-block; padding:2px 8px; border-radius:3px; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.03em; margin-right:6px; }}
            .badge-modern {{ background:#e6f4ea; color:#1e7e34; }}
            .badge-legacy {{ background:#fff3cd; color:#856404; }}
            .note {{ background:#f0f7ff; border-left:3px solid #0969da; padding:12px 16px; margin:16px 0; border-radius:3px; font-size:0.92rem; }}
            .note strong {{ color:#0969da; }}
            table {{ border-collapse:collapse; width:100%; margin:16px 0; font-size:0.9rem; }}
            th, td {{ text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); }}
            th {{ background:#fafafa; font-weight:600; }}
            a {{ color:var(--accent); }}
            footer {{ margin-top:64px; padding-top:24px; border-top:1px solid var(--border); color:var(--muted); font-size:0.85rem; }}
          </style>
          </head>
          <body>

          <header>
            <h1><span class="orange">PyroSQL</span> driver · install</h1>
            <p>PostgreSQL-wire-compatible database client. Link your application against <code>libpyrosql_ffi_pwire.so</code> and connect to any PyroSQL server.</p>
          </header>

          <div class="note">
            <strong>Which track do I choose?</strong><br>
            <span class="badge badge-modern">modern</span> works on every Linux from <strong>2018 or newer</strong> (Ubuntu 20.04+, Debian 11+, RHEL 8+, Fedora, Amazon Linux 2023). Pick this if you&rsquo;re on a current system.<br>
            <span class="badge badge-legacy">legacy</span> works all the way back to <strong>2012</strong> (RHEL 7, CentOS 7, Ubuntu 14.04+, Amazon Linux 2). Pick this only if the modern track fails with a glibc error on install.<br>
            Both tracks ship the same code with the same performance &mdash; only the minimum glibc version differs.
          </div>

          <h2>Debian &middot; Ubuntu &middot; Linux Mint &middot; Pop!_OS &middot; elementary OS</h2>

          <h3><span class="badge badge-modern">modern</span> Ubuntu 20.04+ / Debian 11+</h3>
          <pre><code>curl -fsSL https://{url}/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
          echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://{url}/apt/stable stable main" | sudo tee /etc/apt/sources.list.d/pyrosql.list
          sudo apt update
          sudo apt install pyrosql-driver</code></pre>

          <h3><span class="badge badge-legacy">legacy</span> Ubuntu 14.04 &ndash; 18.04 / Debian 8 &ndash; 10</h3>
          <pre><code>curl -fsSL https://{url}/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/pyrosql.gpg
          echo "deb [signed-by=/usr/share/keyrings/pyrosql.gpg] https://{url}/apt/stable-legacy stable main" | sudo tee /etc/apt/sources.list.d/pyrosql.list
          sudo apt update
          sudo apt install pyrosql-driver</code></pre>

          <h2>Fedora &middot; RHEL &middot; Rocky &middot; Alma &middot; CentOS Stream &middot; Amazon Linux</h2>

          <h3><span class="badge badge-modern">modern</span> RHEL 8+ / Rocky 8+ / Alma 8+ / Fedora / Amazon Linux 2023</h3>
          <pre><code>sudo tee /etc/yum.repos.d/pyrosql.repo &lt;&lt;'EOF'
          [pyrosql]
          name=PyroSQL
          baseurl=https://{url}/yum/stable/\\$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=https://{url}/gpg.key
          EOF
          sudo dnf install pyrosql-driver</code></pre>

          <h3><span class="badge badge-legacy">legacy</span> RHEL 7 / CentOS 7 / Amazon Linux 2</h3>
          <pre><code>sudo tee /etc/yum.repos.d/pyrosql.repo &lt;&lt;'EOF'
          [pyrosql]
          name=PyroSQL
          baseurl=https://{url}/yum/stable-legacy/\\$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=https://{url}/gpg.key
          EOF
          sudo yum install pyrosql-driver</code></pre>

          <h2>openSUSE &middot; SUSE Linux Enterprise</h2>
          <pre><code>sudo zypper addrepo --gpgcheck --refresh https://{url}/yum/stable/\\$basearch/ pyrosql
          sudo rpm --import https://{url}/gpg.key
          sudo zypper install pyrosql-driver</code></pre>

          <h2>Other languages &middot; other platforms</h2>

          <table>
            <thead><tr><th>Platform</th><th>Command</th></tr></thead>
            <tbody>
              <tr><td>Rust (crates.io)</td><td><code>cargo add pyrosql</code></td></tr>
              <tr><td>Python (PyPI)</td><td><code>pip install pyrosql</code></td></tr>
              <tr><td>macOS &middot; Windows</td><td>Grab the <code>.dylib</code> / <code>.dll</code> from the <a href="https://github.com/{os.environ.get('GITHUB_REPOSITORY','PyroSQL/pyrosql-driver')}/releases/latest">latest release</a></td></tr>
              <tr><td>Raw library (any Linux)</td><td>Same as above &mdash; <code>.so</code> tarball from Releases</td></tr>
            </tbody>
          </table>

          <h2>Verify the installation</h2>
          <pre><code># Ensure the shared library is loadable
          ldconfig -p | grep pyrosql
          # → libpyrosql_ffi_pwire.so (libc6,x86-64) => /usr/lib/x86_64-linux-gnu/libpyrosql_ffi_pwire.so

          # Check the package version
          apt show pyrosql-driver 2&gt;/dev/null || rpm -qi pyrosql-driver</code></pre>

          <h2>Troubleshooting</h2>

          <h3>&ldquo;GLIBC_2.XX not found&rdquo; on install</h3>
          <p>Your system&rsquo;s glibc is older than the modern track requires. Switch to the legacy repo (URL above) and reinstall.</p>

          <h3>&ldquo;The following signatures couldn&rsquo;t be verified&rdquo;</h3>
          <p>The signing key wasn&rsquo;t imported. Re-run the <code>curl &hellip; gpg.key</code> step above.</p>

          <h3>&ldquo;Unable to locate package pyrosql-driver&rdquo;</h3>
          <p><code>apt update</code> didn&rsquo;t see the new source. Check that <code>/etc/apt/sources.list.d/pyrosql.list</code> exists and re-run <code>sudo apt update</code>.</p>

          <h2>Uninstall</h2>
          <pre><code># Debian / Ubuntu
          sudo apt remove pyrosql-driver
          sudo rm /etc/apt/sources.list.d/pyrosql.list /usr/share/keyrings/pyrosql.gpg

          # RHEL / Fedora
          sudo dnf remove pyrosql-driver
          sudo rm /etc/yum.repos.d/pyrosql.repo</code></pre>


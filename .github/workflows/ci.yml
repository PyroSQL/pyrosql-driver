name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-rust:
    name: Rust check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # pyro-runtime is fetched from the private PyroSQL/pyrosql repo.
      # Runners need a PAT with read access stored as secret
      # PYROSQL_REPO_TOKEN.  If the secret is missing the job continues
      # but will fail at `cargo fetch`; we emit a clear ::warning::
      # describing the fix.
      - name: Configure git to fetch pyro-runtime via token
        env:
          PYROSQL_REPO_TOKEN: ${{ secrets.PYROSQL_REPO_TOKEN }}
        run: |
          if [ -z "$PYROSQL_REPO_TOKEN" ]; then
            echo "::warning::PYROSQL_REPO_TOKEN secret is not set — cargo will fail to resolve pyro-runtime. Create a fine-grained PAT with read access to PyroSQL/pyrosql and save it as the repo secret PYROSQL_REPO_TOKEN."
          else
            git config --global url."https://x-access-token:${PYROSQL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - run: cargo check --workspace
      - run: cargo test --workspace

  check-ffi-pwire:
    name: FFI PWire build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ffi-pwire is standalone (no pyro-runtime dep) — no token needed.
      - run: cargo build --manifest-path ffi-pwire/Cargo.toml

  check-python:
    name: Python package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: cd python && python -m build --wheel --outdir dist/
      - run: pip install python/dist/*.whl
      - run: python -c "from pyrosql import connect; print('Python import OK')"

  check-php:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: php -l php/src/Client.php
    continue-on-error: true
